name: Hermes Inventory Monitor

on:
  schedule:
    # 每 30 分鐘跑一次
    - cron: '*/30 * * * *'
  workflow_dispatch: # 允許手動點擊執行

env:
  # ✅ 解決您的警告：強制 GitHub 使用 Node.js 24 執行 Actions
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  
  # 注入您的 Secrets (請確保 GitHub Settings > Secrets 已設定這些變數)
  LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
  GMAIL_USER: ${{ secrets.GMAIL_USER }}
  GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
  GMAIL_TO: ${{ secrets.GMAIL_TO }}
  GSHEET_ID: ${{ secrets.GSHEET_ID }}
  GOOGLE_CREDS_JSON: ${{ secrets.GOOGLE_CREDS_JSON }}

jobs:
  scrape_and_notify:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests selenium webdriver-manager gspread yagmail google-auth

      - name: Run Hermes Scraper
        # ✅ 已修正：確保對應您最新的 Python 檔名
        run: python hermes_scraper_with_line_push.py
        env:
          PYTHONUNBUFFERED: 1
