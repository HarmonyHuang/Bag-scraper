name: Hermes Inventory Monitor

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

env:
  # 解決 Node.js 20 警告
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  
  # Secrets 配置
  LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
  GMAIL_USER: ${{ secrets.GMAIL_USER }}
  GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
  GMAIL_TO: ${{ secrets.GMAIL_TO }}
  GSHEET_ID: ${{ secrets.GSHEET_ID }}
  GOOGLE_CREDS_JSON: ${{ secrets.GOOGLE_CREDS_JSON }}

jobs:
  scrape_and_notify:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Google Chrome
        # 使用更強制的安裝方式，並加上 || true 防止因為小警告導致 Exit 100
        run: |
          sudo apt-get update --fix-missing
          sudo apt-get install -y google-chrome-stable || true

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests selenium webdriver-manager gspread yagmail google-auth fake-useragent

      - name: Run Hermes Scraper
        # 確保檔名正確，並加上執行權限
        run: python your_script_name.py 
        env:
          PYTHONUNBUFFERED: 1
